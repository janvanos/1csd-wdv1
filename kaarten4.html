<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        background-color: chartreuse;
        display: grid;
        grid-template-columns: repeat(4, fr);
        grid-template-rows: repeat(4, fr);
      }
      .container div {
        background-color: rgb(34, 100, 100);
        display: inline-block;
        width: 150px;
        height: 200px;
      }

      .container div:nth-child(1) {
        grid-column: 1;
        grid-row: 1;
      }
      .container div:nth-child(2) {
        grid-column: 2;
        grid-row: 2;
      }
      .container div:nth-child(3) {
        grid-column: 3;
        grid-row: 3;
      }
      .container div:nth-child(4) {
        grid-column: 4;
        grid-row: 4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quos quisquam
        ipsum cum beatae, nostrum facilis reprehenderit asperiores sunt optio,
        ducimus necessitatibus ut animi saepe repellendus neque quam et
        voluptate labore!
      </div>
      <div>
        <img src="https://picsum.photos/200/300" alt="" />
      </div>
      <div>3</div>
      <div>4</div>
    </div>
  </body>
</html>
