
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="product-card">
  <h3>Sneaker</h3>
  <p>€89</p>
  <button class="cta ">Add to cart</button>


</div>

</body>
</html>



<style>
    .product-card{
  width:200px;
  padding:20px;
  background:white;
  border-radius:10px;
  transition:transform .3s, box-shadow .3s;
}

.product-card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}



.cta{
  padding:12px 25px;
  background:#111;
  color:white;
  border:none;
  border-radius:6px;
  transition:.3s;
}

.cta:hover{
  box-shadow:
    0 0 10px #014b02,
    0 0 25px #014904;
}

.ripple{
  position:relative;
  overflow:hidden;
}

.ripple:active::after{
  content:"";
  position:absolute;
  width:200px;
  height:200px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  transform:translate(-50%,-50%);
  animation:ripple .6s;
}

@keyframes ripple{
  from{opacity:1;transform:scale(0)}
  to{opacity:0;transform:scale(3)}
}
</style>
