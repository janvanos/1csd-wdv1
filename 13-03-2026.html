<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .poppetje {
            width: 50px;
            height: 50px;
            background-color:rgb(214, 25, 82);
            border-radius: 50%;
            color: #fff;
            text-align: center;
            line-height: 50px;
            font-size: 30px;
            animation: poppetjebeweeg 20s linear infinite;
            position: absolute;
        }

        @keyframes poppetjebeweeg {
            0% {
                left: 5px;
            }
            50% {
                left: 50%;
            }
            100% {
                left: 5px;
            }
        }

        .menu {
            background-color: #000;
            transition: background-color 1s ease-in-out;
        }
        .menu:hover {
            background-color: #c9c9c9;
        }

        ul{
            width: 0;
            height: 0;
            overflow: hidden;
            transition: width .5s ease-in-out;
            border: 1px solid #000;
        }

        ul.open {
            width: 100px;
            height: 100px;
        }

        .products{
            display: flex;
            gap: 10px;
        }

        .product{
            transition: box-shadow .5s ease-in-out;
            transition: width .5s ease-in-out;
            overflow: hidden;
        }
        .product:hover {
            box-shadow: 0px 0px 2px 2px  #000;
        }
.product img {
